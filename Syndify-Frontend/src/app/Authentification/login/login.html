<div class="min-h-screen w-screen flex items-center justify-center font-['Poppins'] overflow-hidden relative bg-white">
    
    <div class="absolute inset-0 z-0">
        <div class="absolute -top-[30%] -left-[10%] w-[70%] h-[150%] bg-syndify-dark rotate-12 shadow-2xl"></div>
        <div class="absolute top-[60%] right-[-5%] w-64 h-64 bg-syndify-light rounded-full blur-3xl opacity-50"></div>
    </div>

    <div class="relative z-10 w-full max-w-[450px] mx-4">
        <div class="bg-white p-10 md:p-12 rounded-[2.5rem] shadow-[0_40px_80px_-15px_rgba(27,59,50,0.15)] border border-gray-50">
            
            <div class="flex justify-center mb-8">
                <div class="w-16 h-16 bg-syndify-dark rounded-2xl flex items-center justify-center shadow-lg transform hover:scale-105 transition-all">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                </div>
            </div>

            <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm font-bold rounded">
                {{ errorMessage }}
            </div>

            <div *ngIf="step === 1">
                <div class="text-center mb-10">
                    <h1 class="text-[28px] font-black text-syndify-text tracking-tight uppercase">Connexion</h1>
                    <p class="text-gray-400 font-medium mt-1">Accès sécurisé Syndify</p>
                </div>

                <form class="space-y-6">
                    <div class="group">
                        <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 group-focus-within:border-syndify-dark/20 group-focus-within:bg-white transition-all shadow-sm">
                            <label class="block text-[10px] font-black text-syndify-dark/40 mb-1 uppercase tracking-[0.2em]">Email ou Téléphone</label>
                            <input type="text" [(ngModel)]="identifier" name="identifier" placeholder="syndic@exemple.ma" 
                                   class="w-full bg-transparent text-syndify-text font-bold text-base outline-none placeholder-gray-300"
                                   [disabled]="isLoading">
                        </div>
                    </div>

                    <button type="button" (click)="sendCode()" [disabled]="isLoading || !identifier" 
                            class="w-full bg-syndify-dark text-white font-black py-4 rounded-2xl hover:bg-syndify-text transition-all shadow-xl shadow-syndify-dark/20 transform active:scale-[0.98] flex items-center justify-center gap-2 disabled:opacity-70">
                        <span>{{ isLoading ? 'Envoi en cours...' : 'Suivant' }}</span>
                        <svg *ngIf="!isLoading" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                    </button>
                </form>
            </div>

            <div *ngIf="step === 2">
                <div class="text-center mb-8">
                    <h1 class="text-[28px] font-black text-syndify-text tracking-tight uppercase">Vérification</h1>
                    <p class="text-gray-400 font-medium mt-1 text-sm">Entrez le code de sécurité reçu</p>
                </div>

                <form class="space-y-8">
                    <div class="flex justify-between gap-2 md:gap-3">
                        <input #otp1 type="text" maxlength="1" [(ngModel)]="otp[0]" name="otp0" (keyup)="moveFocus($event, null, otp1, otp2)"
                               class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-black bg-gray-50 border-2 border-gray-200 focus:border-syndify-dark focus:bg-white rounded-2xl outline-none transition-all duration-300 text-syndify-text shadow-sm" [disabled]="isLoading">
                        
                        <input #otp2 type="text" maxlength="1" [(ngModel)]="otp[1]" name="otp1" (keyup)="moveFocus($event, otp1, otp2, otp3)"
                               class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-black bg-gray-50 border-2 border-gray-200 focus:border-syndify-dark focus:bg-white rounded-2xl outline-none transition-all duration-300 text-syndify-text shadow-sm" [disabled]="isLoading">
                        
                        <input #otp3 type="text" maxlength="1" [(ngModel)]="otp[2]" name="otp2" (keyup)="moveFocus($event, otp2, otp3, otp4)"
                               class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-black bg-gray-50 border-2 border-gray-200 focus:border-syndify-dark focus:bg-white rounded-2xl outline-none transition-all duration-300 text-syndify-text shadow-sm" [disabled]="isLoading">
                        
                        <input #otp4 type="text" maxlength="1" [(ngModel)]="otp[3]" name="otp3" (keyup)="moveFocus($event, otp3, otp4, otp5)"
                               class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-black bg-gray-50 border-2 border-gray-200 focus:border-syndify-dark focus:bg-white rounded-2xl outline-none transition-all duration-300 text-syndify-text shadow-sm" [disabled]="isLoading">
                               
                        <input #otp5 type="text" maxlength="1" [(ngModel)]="otp[4]" name="otp4" (keyup)="moveFocus($event, otp4, otp5, null)"
                               class="w-12 h-14 md:w-14 md:h-16 text-center text-2xl font-black bg-gray-50 border-2 border-gray-200 focus:border-syndify-dark focus:bg-white rounded-2xl outline-none transition-all duration-300 text-syndify-text shadow-sm" [disabled]="isLoading">
                    </div>

                    <button type="button" (click)="verifyCode()" [disabled]="isLoading" 
                            class="w-full bg-syndify-dark text-white font-black py-4 rounded-2xl hover:bg-syndify-text transition-all shadow-xl shadow-syndify-dark/20 transform active:scale-[0.98] disabled:opacity-70">
                        {{ isLoading ? 'Vérification...' : 'Vérifier le code' }}
                    </button>
                </form>

                <div class="mt-8 text-center">
                    <button (click)="step = 1; otp = ['', '', '', '', '']" class="text-xs font-black text-gray-400 hover:text-syndify-dark transition-colors uppercase tracking-widest flex items-center justify-center gap-2 mx-auto">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        Retour au numéro
                    </button>
                </div>
            </div>

            <div class="mt-10 flex flex-col items-center gap-4 border-t border-gray-50 pt-6">
                <p class="text-[13px] font-bold text-gray-400">Nouveau sur Syndify ? <a href="/register" class="text-syndify-dark hover:underline underline-offset-4 decoration-2">S'inscrire</a></p>
            </div>
        </div>
    </div>

    <div class="absolute bottom-6 z-10 text-syndify-dark/30 text-[10px] font-black tracking-widest uppercase">
        Syndify Management &copy; 2026
    </div>
</div>
