<div class="flex flex-col min-h-full font-['Poppins'] bg-syndify-bg">

  <app-page-header 
    parentPath="Résidence les jardins"
    currentPath="Liste des copropriétaires"
    title="Liste des copropriétaires"
    [statsText]="totalAffichage + ' copropriétaires actifs au total'"
    [statsSubText]="'(' + coproprietaires.length + ' affichés)'">
    
    <button title="Exporter" class="flex items-center justify-center w-[38px] h-[38px] bg-white/10 border border-white/20 rounded-lg hover:bg-white/20 text-white transition-all cursor-pointer shadow-sm">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
    </button>

    <button (click)="openAddModal()" class="btn-primary !bg-syndify-accent !text-white border-0 shadow-md">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
      Ajouter un copropriétaire
    </button>

  </app-page-header>

  <div class="px-6 md:px-8 pt-4 border-b border-gray-200 bg-white">
    <div class="flex items-center gap-8">
      <button (click)="changerTab('actif')" [ngClass]="currentStatus === 'actif' ? 'text-syndify-dark border-syndify-accent' : 'text-gray-400 border-transparent hover:text-syndify-dark'" class="pb-3 text-[13px] font-bold border-b-[3px] transition-colors cursor-pointer uppercase tracking-wider">
        Copropriétaires Actifs
      </button>
      <button (click)="changerTab('inactif')" [ngClass]="currentStatus === 'inactif' ? 'text-syndify-dark border-syndify-accent' : 'text-gray-400 border-transparent hover:text-syndify-dark'" class="pb-3 text-[13px] font-bold border-b-[3px] transition-colors cursor-pointer uppercase tracking-wider">
        Copropriétaires Inactifs
      </button>
    </div>
  </div>

  <div class="flex-1 p-6 md:p-8">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="overflow-x-auto">
        
        <table class="table-syndify w-full text-left">
          
          <thead>
            <tr class="border-b border-gray-100 bg-gray-50/50">
              <th class="py-3 px-5 font-bold text-gray-500 text-[12px] uppercase tracking-wider">Identifiant</th>
              <th class="py-3 px-5 font-bold text-gray-500 text-[12px] uppercase tracking-wider">Nom & Prénom</th>
              <th class="py-3 px-5 font-bold text-gray-500 text-[12px] uppercase tracking-wider">Email</th>
              <th class="py-3 px-5 font-bold text-gray-500 text-[12px] uppercase tracking-wider">Nbr de lots</th>
              <th class="py-3 px-5 font-bold text-gray-500 text-[12px] uppercase tracking-wider">Status</th>
              <th class="py-3 px-5 text-right"></th>
            </tr>
          </thead>
          
          <tbody class="text-[13px]">
            <tr *ngFor="let copro of coproprietaires" class="border-b border-gray-50 hover:bg-gray-50/50 transition-colors">
              <td class="py-3 px-5 font-bold text-syndify-dark">{{ copro.user_id }}</td>
              <td class="py-3 px-5 text-slate-700 font-medium">{{ copro.nom }}</td>
              <td class="py-3 px-5 text-slate-500 font-medium">{{ copro.email }}</td>
              <td class="py-3 px-5 text-slate-500 font-medium" [ngClass]="{'italic text-gray-400': copro.lots === '-- Non affecté --'}">{{ copro.lots }}</td>
              <td class="py-3 px-5">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-bold"
                      [ngClass]="{
                        'bg-green-50 text-green-600': copro.status === 'Actif',
                        'bg-gray-100 text-gray-500': copro.status === 'Inactif',
                        'bg-orange-50 text-orange-600': copro.status === 'En attente'
                      }">
                  {{ copro.status }}
                </span>
              </td>
              <td class="py-3 px-5 text-right">
                <button class="p-2 rounded-lg text-gray-400 hover:text-syndify-dark hover:bg-gray-100 transition-colors cursor-pointer">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 14a2 2 0 100-4 2 2 0 000 4zm-7 0a2 2 0 100-4 2 2 0 000 4zm14 0a2 2 0 100-4 2 2 0 000 4z"></path></svg>
                </button>
              </td>
            </tr>
          </tbody>

        </table>
      </div>
      
      <div *ngIf="isThereMore" class="text-center py-4 border-t border-gray-50 bg-gray-50/30">
        <button (click)="chargerListe()" [disabled]="isLoading" class="text-syndify-dark font-bold text-[13px] hover:text-syndify-accent transition-colors cursor-pointer disabled:opacity-50">
          <span *ngIf="!isLoading">Afficher plus</span>
          <span *ngIf="isLoading">Chargement en cours...</span>
        </button>
      </div>

    </div>
  </div>

</div>
