server {
    listen 80;

    location / {
        # 👈 Zidna had 2 lignes bach Nginx dima i-jib l'IP jdid dyal l'Frontend
        resolver 127.0.0.11 valid=30s;
        set $upstream_frontend syndify_frontend;
        
        proxy_pass http://$upstream_frontend:4200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /api {
        resolver 127.0.0.11 valid=30s;
        set $upstream_backend syndify_backend;
        
        proxy_pass http://$upstream_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}